<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Review | ISP Monitor Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="url(#sg)"/><circle cx="16" cy="16" r="5" stroke="#fff" stroke-width="2"/><path d="M10 16h-4M26 16h-4M16 10V6M16 26v-4" stroke="#fff" stroke-width="2" stroke-linecap="round"/><defs><linearGradient id="sg" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs></svg>
      </div>
      <div class="sidebar-brand">
        <h2>ISP Monitor</h2>
        <span class="sidebar-badge">Admin</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="clients.html" class="nav-item" data-page="clients">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Clients</span>
      </a>
      <a href="applications.html" class="nav-item" data-page="applications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Applications</span>
        <span class="nav-badge" id="navAppBadge" style="display:none">0</span>
      </a>
      <a href="tickets.html" class="nav-item active" data-page="tickets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span>Tech Review</span>
        <span class="nav-badge" id="navTicketBadge" style="display:none">0</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-info">
        <div class="admin-avatar">A</div>
        <div class="admin-meta">
          <span id="adminName">Administrator</span>
          <small>System Admin</small>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn" title="Sign Out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <div class="mobile-header">
    <button class="hamburger" id="menuToggle"><span></span><span></span><span></span></button>
    <h1>ISP Monitor</h1>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1>Tech Review</h1>
        <p class="page-subtitle">Support tickets & technical issues</p>
      </div>
      <div class="header-actions">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="open">Open</button>
          <button class="filter-tab" data-filter="closed">Closed</button>
        </div>
      </div>
    </div>

    <div class="tickets-list" id="ticketsList">
      <div class="loading-state"><div class="spinner"></div> Loading tickets...</div>
    </div>
  </main>

  <!-- Ticket Modal -->
  <div class="modal-overlay" id="ticketModal" style="display:none">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Ticket Details</h2>
        <button class="modal-close" id="ticketModalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="detail-grid">
          <div class="detail-item"><label>From</label><span id="tModalName"></span></div>
          <div class="detail-item"><label>Account ID</label><span id="tModalAccount"></span></div>
          <div class="detail-item"><label>Contact</label><span id="tModalContact"></span></div>
          <div class="detail-item"><label>Priority</label><span id="tModalPriority"></span></div>
          <div class="detail-item full-width"><label>Subject</label><span id="tModalSubject"></span></div>
          <div class="detail-item full-width"><label>Message</label><p id="tModalMessage"></p></div>
        </div>
        <div class="form-group">
          <label for="adminReply">Admin Reply</label>
          <textarea id="adminReply" rows="4" placeholder="Type your reply..."></textarea>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-approve" id="btnReplyClose">Reply & Close</button>
        <button class="btn btn-review" id="btnReplyKeepOpen">Reply & Keep Open</button>
        <button class="btn btn-cancel" id="btnTicketCancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
  <script>
    let currentTicketId = null;
    const tFilterTabs = document.querySelectorAll('.filter-tab');
    let ticketFilter = 'all';

    tFilterTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tFilterTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        ticketFilter = tab.dataset.filter;
        loadTickets();
      });
    });

        let allTickets = [];
        window.loadTickets = async function() {
          try {
            const res = await fetch('/api/admin/tickets');
            if (res.status === 401) return window.location.href = 'login.html';
            allTickets = await res.json();
            const filtered = ticketFilter === 'all' ? allTickets : allTickets.filter(t => t.status === ticketFilter);
            const list = document.getElementById('ticketsList');
    
            if (filtered.length === 0) {
              list.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><h3>No tickets found</h3><p>There are no ' + ticketFilter + ' tickets.</p></div>';
              return;
            }
    
            list.innerHTML = filtered.map(t => {
              const priorityClass = t.priority === 'high' ? 'priority-high' : t.priority === 'low' ? 'priority-low' : 'priority-normal';
              return `
              <div class="ticket-card ${t.status === 'closed' ? 'ticket-closed' : ''}">
                <div class="ticket-left">
                  <div class="ticket-status-dot ${t.status}"></div>
                  <div class="ticket-info">
                    <h3>${t.subject}</h3>
                    <div class="ticket-meta">
                      <span class="ticket-from">${t.full_name}</span>
                      ${t.account_id ? `<span class="ticket-account">${t.account_id}</span>` : ''}
                      <span class="priority-badge ${priorityClass}">${t.priority}</span>
                      <span class="ticket-date">${new Date(t.created_at).toLocaleDateString()}</span>
                    </div>
                    <p class="ticket-preview">${t.message.substring(0, 120)}${t.message.length > 120 ? '...' : ''}</p>
                    ${t.admin_reply ? `<div class="ticket-reply"><strong>Reply:</strong> ${t.admin_reply}</div>` : ''}
                  </div>
                </div>
                <div class="ticket-actions">
                  <span class="status-pill ${t.status}">${t.status === 'open' ? 'Open' : 'Closed'}</span>
                  ${t.status === 'open' ? `<button class="btn btn-small btn-review" onclick="openTicket(${t.id})">Respond</button>` : ''}
                </div>
              </div>`;
            }).join('');
      } catch (err) {
        console.error(err);
      }
    }

    window.openTicket = function(id) {
      const ticket = allTickets.find(t => t.id === id);
      if (!ticket) return;
      currentTicketId = id;
      document.getElementById('tModalName').textContent = ticket.full_name;
      document.getElementById('tModalAccount').textContent = ticket.account_id || 'N/A';
      document.getElementById('tModalContact').textContent = ticket.contact || 'N/A';
      document.getElementById('tModalPriority').textContent = ticket.priority;
      document.getElementById('tModalSubject').textContent = ticket.subject;
      document.getElementById('tModalMessage').textContent = ticket.message;
      document.getElementById('adminReply').value = ticket.admin_reply || '';
      document.getElementById('ticketModal').style.display = 'flex';
    }

    document.getElementById('ticketModalClose').onclick = () => document.getElementById('ticketModal').style.display = 'none';
    document.getElementById('btnTicketCancel').onclick = () => document.getElementById('ticketModal').style.display = 'none';

    window.replyTicket = async function(closeIt) {
      await fetch(`/api/admin/tickets/${currentTicketId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: closeIt ? 'closed' : 'open', admin_reply: document.getElementById('adminReply').value })
      });
      document.getElementById('ticketModal').style.display = 'none';
      loadTickets();
    }

    document.getElementById('btnReplyClose').onclick = () => replyTicket(true);
    document.getElementById('btnReplyKeepOpen').onclick = () => replyTicket(false);

    loadTickets();
  </script>
</body>
</html>
