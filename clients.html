<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Management | ISP Monitor Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="url(#sg)"/><circle cx="16" cy="16" r="5" stroke="#fff" stroke-width="2"/><path d="M10 16h-4M26 16h-4M16 10V6M16 26v-4" stroke="#fff" stroke-width="2" stroke-linecap="round"/><defs><linearGradient id="sg" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs></svg>
      </div>
      <div class="sidebar-brand">
        <h2>ISP Monitor</h2>
        <span class="sidebar-badge">Admin</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="clients.html" class="nav-item active" data-page="clients">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Clients</span>
      </a>
      <a href="applications.html" class="nav-item" data-page="applications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Applications</span>
        <span class="nav-badge" id="navAppBadge" style="display:none">0</span>
      </a>
      <a href="tickets.html" class="nav-item" data-page="tickets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span>Tech Review</span>
        <span class="nav-badge" id="navTicketBadge" style="display:none">0</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-info">
        <div class="admin-avatar">A</div>
        <div class="admin-meta">
          <span id="adminName">Administrator</span>
          <small>System Admin</small>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn" title="Sign Out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- Mobile Header -->
  <div class="mobile-header">
    <button class="hamburger" id="menuToggle">
      <span></span><span></span><span></span>
    </button>
    <h1>ISP Monitor</h1>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1>Client Management</h1>
        <p class="page-subtitle">View and manually manage your client database</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-secondary" id="pushToMikroTikBtn" title="Push all local clients to MikroTik">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;margin-right:6px;"><path d="M7 17l5-5 5 5M7 7l5 5 5-5"/></svg>
          Push to Router
        </button>
        <button class="btn btn-secondary btn-sync" id="syncBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;margin-right:6px;"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 12c0-4.4 3.6-8 8-8 3.3 0 6.2 2 7.4 4.9M22 12c0 4.4-3.6 8-8 8-3.3 0-6.2-2-7.4-4.9"/></svg>
          Sync MikroTik
        </button>
        <button class="btn btn-primary" id="addClientBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;margin-right:6px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add New Client
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Client Directory</h2>
        <div class="card-actions">
          <input type="text" class="search-input" id="clientSearch" placeholder="Search by name, user, or ID...">
        </div>
      </div>
      <div class="table-container">
        <table class="data-table" id="clientsTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>PPPoE User</th>
              <th>Plan</th>
              <th>Gmail</th>
              <th>Contact</th>
              <th>Status</th>
              <th>Installation</th>
              <th style="width: 100px;">Actions</th>
            </tr>
          </thead>
          <tbody id="clientsTbody">
            <tr><td colspan="7" class="loading-cell"><div class="spinner"></div> Loading clients...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Add Client Modal -->
  <div class="modal" id="addClientModal">
    <div class="modal-content" style="max-width: 700px;">
      <div class="modal-header">
        <h2 id="modalTitle">Add New Client</h2>
        <button class="close-modal-btn">&times;</button>
      </div>
      <form id="addClientForm">
        <input type="hidden" name="client_id" id="client_id">
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Full Name</label>
            <input type="text" name="full_name" placeholder="Client's complete name" required>
          </div>
          <div class="form-group">
            <label>Gmail / Email</label>
            <input type="email" name="email" placeholder="example@gmail.com">
          </div>
          <div class="form-group">
            <label>Contact Number</label>
            <input type="tel" name="contact" placeholder="09xxxxxxxxx">
          </div>
          <div class="form-group">
            <label>Internet Plan</label>
            <select name="plan" required>
              <option value="Basic 10Mbps">Basic 10Mbps (₱899)</option>
              <option value="Standard 25Mbps">Standard 25Mbps (₱1299)</option>
              <option value="Pro 50Mbps" selected>Pro 50Mbps (₱1899)</option>
              <option value="Ultra 100Mbps">Ultra 100Mbps (₱2499)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Installation Date</label>
            <input type="date" name="installation_date" required id="installDateInput">
          </div>
          <div class="form-group">
            <label>PPPoE Username</label>
            <input type="text" name="pppoe_user" placeholder="mikrotik_username" required>
          </div>
          <div class="form-group">
            <label>PPPoE Password</label>
            <input type="text" name="pppoe_pass" placeholder="mikrotik_password" required>
          </div>
          <div class="form-group full-width">
            <label>Service Address</label>
            <input type="text" name="address" placeholder="Complete address">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary close-modal-btn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveClientBtn">Create Client</button>
        </div>
      </form>
    </div>
  </div>

  <style>
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; padding: 1rem 0; }
    .full-width { grid-column: span 2; }
    .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 500; font-size: 0.85rem; color: var(--text-dim); }
    .form-group input, .form-group select { width: 100%; padding: 0.6rem 0.8rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; width: 95%; max-height: 90vh; overflow-y: auto; padding: 1.5rem; position: relative; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1rem; }
    .close-modal-btn { background: none; border: none; color: var(--text-dim); font-size: 1.5rem; cursor: pointer; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 0.8rem; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 1rem; }
  </style>

  <script src="admin.js"></script>
</body>
</html>
